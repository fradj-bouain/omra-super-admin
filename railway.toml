# Railway deploy : Node sert le build Angular (sans Docker / Nginx)
# Dans le dashboard Railway : définir « Root Directory » sur admin-omra si le dépôt est à la racine du mono-repo.

[build]
builder = "nixpacks"
buildCommand = "unset NPM_CONFIG_PRODUCTION; export NODE_OPTIONS='--max-old-space-size=4096'; npm run build"

[deploy]
startCommand = "node server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
