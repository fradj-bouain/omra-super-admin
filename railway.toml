# Déploiement Railway — root du service = ce dossier (omra-super-admin).
# Si le dashboard Railway a un « Custom Build Command » ou « Custom Start Command », les vider
# pour que ce fichier s’applique (sinon ils écrasent build/start et cassent le déploiement).

[build]
builder = "nixpacks"
buildCommand = "unset NPM_CONFIG_PRODUCTION; export NODE_OPTIONS='--max-old-space-size=4096'; npm run build"

[deploy]
startCommand = "node server.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
