<div class="login-wrap">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Administration Omra</mat-card-title>
      <mat-card-subtitle>Connexion réservée aux comptes de la table <strong>admins</strong> (création des agences).</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline" class="full">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="username" />
          <mat-error>E-mail requis</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error>Mot de passe requis</mat-error>
        </mat-form-field>
        <button mat-flat-button color="primary" class="submit" type="submit" [disabled]="form.invalid || loading">
          @if (loading) {
            <mat-spinner diameter="22"></mat-spinner>
          } @else {
            Se connecter
          }
        </button>
      </form>
      <p class="hint">L’application agence (pèlerins, groupes…) : <code>http://localhost:4200</code> — cette console est sur le port <code>4201</code>.</p>
    </mat-card-content>
  </mat-card>
</div>
