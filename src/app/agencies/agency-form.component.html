<div class="page-head">
  <div>
    <a routerLink="/agencies" class="back">← Agences</a>
    <h1 class="page-head__title">{{ isEdit ? 'Modifier l’agence' : 'Nouvelle agence' }}</h1>
  </div>
</div>

<mat-card class="form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <div class="grid">
        <mat-form-field appearance="outline">
          <mat-label>Nom</mat-label>
          <input matInput formControlName="name" />
          <mat-error>Requis</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" />
          <mat-error>Email valide requis</mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Téléphone</mat-label>
          <input matInput formControlName="phone" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Pays</mat-label>
          <input matInput formControlName="country" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Ville</mat-label>
          <input matInput formControlName="city" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Adresse</mat-label>
          <input matInput formControlName="address" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="span-2">
          <mat-label>Statut</mat-label>
          <mat-select formControlName="status">
            <mat-option value="ACTIVE">Actif</mat-option>
            <mat-option value="SUSPENDED">Suspendu</mat-option>
            <mat-option value="EXPIRED">Expiré</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="actions">
        <button mat-button type="button" routerLink="/agencies">Annuler</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || loading">
          {{ loading ? '…' : (isEdit ? 'Enregistrer' : 'Créer') }}
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
